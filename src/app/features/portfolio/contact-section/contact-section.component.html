<section id="contact" class="section contact" aria-labelledby="contact-heading">
  <div class="section__inner">
    <header class="section__header">
      <h2 id="contact-heading" class="section__title">Let’s connect</h2>
      <p class="section__subtitle">
        Open to remote opportunities aligned with backend, .NET, and cloud-native engineering.
      </p>
    </header>
    <div class="contact__panel">
      <div class="contact__avatar-wrapper">
        <img
          class="contact__avatar"
          src="/assets/images/photoface.JPG"
          alt="Foto de perfil de William"
          loading="lazy"
        />
      </div>
      <div class="contact__row">
        <span class="contact__label">Email</span>
        <a class="contact__value" [href]="'mailto:' + contact().email">{{ contact().email }}</a>
      </div>
      <div class="contact__row">
        <span class="contact__label">Phone</span>
        <a class="contact__value" [href]="phoneHref(contact().phone)">{{ contact().phone }}</a>
      </div>
      <div class="contact__row">
        <span class="contact__label">LinkedIn</span>
        <a class="contact__value" [href]="contact().linkedInUrl" target="_blank" rel="noopener noreferrer">
          {{ linkedInLabel(contact().linkedInUrl) }}
        </a>
      </div>
      <div class="contact__row">
        <span class="contact__label">Location</span>
        <span class="contact__value contact__value--static">{{ contact().location }}</span>
      </div>
    </div>
  </div>
</section>
