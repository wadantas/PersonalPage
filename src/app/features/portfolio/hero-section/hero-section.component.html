<section id="top" class="hero" aria-labelledby="hero-title">
  <div class="hero__glow" aria-hidden="true"></div>
  <div class="hero__content">
    <p class="hero__eyebrow">Portfolio & résumé</p>
    <h1 id="hero-title" class="hero__title">{{ contact().name }}</h1>
    <p class="hero__headline">{{ contact().headline }}</p>
    <div class="hero__meta">
      <span class="hero__chip">{{ contact().location }}</span>
      <span class="hero__chip hero__chip--accent">{{ contact().availability }}</span>
    </div>
    <div class="hero__actions">
      <a class="btn btn--primary" href="#contact">Contact me</a>
      <a class="btn btn--ghost" href="#experience">View experience</a>
    </div>
  </div>
</section>
